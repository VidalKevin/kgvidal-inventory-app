name: ShipHero In-Transit + Inventory Sync

on:
  workflow_dispatch:
    inputs:
      source:
        description: "What queued this sync"
        required: false
        default: "manual"

jobs:
  shiphero-intransit-inventory-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Refresh ShipHero in-transit data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHIPHERO_EMAIL: ${{ secrets.SHIPHERO_EMAIL }}
          SHIPHERO_PASSWORD: ${{ secrets.SHIPHERO_PASSWORD }}
          SHIPHERO_HEADLESS: "true"
        run: npm run sync:shiphero-intransit

      - name: Run Shopify inventory sync
        env:
          APP_URL: ${{ secrets.SHOPIFY_SYNC_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing SHOPIFY_SYNC_APP_URL secret."
            exit 1
          fi

          endpoint="${APP_URL%/}/api/sync/shopify-inventory?skip_shiphero=1"
          echo "Calling $endpoint at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl --fail-with-body --show-error --silent "$endpoint"
