name: Shopify Scheduled Sync

on:
  workflow_dispatch:
  schedule:
    # Lightweight schedule check. The app only runs Shopify sync when
    # the saved Supabase schedule is due. Run on Fri/Sat/Sun UTC so
    # Eastern-time Friday/Saturday schedules are covered after UTC rollover.
    - cron: "*/15 * * * 5,6,0"

jobs:
  shopify-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Call scheduled sync endpoint
        env:
          APP_URL: ${{ secrets.SHOPIFY_SYNC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing SHOPIFY_SYNC_APP_URL secret."
            exit 1
          fi

          endpoint="${APP_URL%/}/api/cron/shopify-sync"
          echo "Calling $endpoint at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [ -n "$CRON_SECRET" ]; then
            curl --fail-with-body --show-error --silent \
              --header "Authorization: Bearer $CRON_SECRET" \
              "$endpoint"
          else
            curl --fail-with-body --show-error --silent "$endpoint"
          fi
