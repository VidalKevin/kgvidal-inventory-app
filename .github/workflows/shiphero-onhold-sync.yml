name: ShipHero On-Hold Sync

on:
  workflow_dispatch:
    inputs:
      source:
        description: "What queued this sync"
        required: false
        default: "manual"
      run_key:
        description: "Schedule run key"
        required: false
        default: ""

jobs:
  shiphero-onhold-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run ShipHero on-hold sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHIPHERO_EMAIL: ${{ secrets.SHIPHERO_EMAIL }}
          SHIPHERO_PASSWORD: ${{ secrets.SHIPHERO_PASSWORD }}
          SHIPHERO_HEADLESS: "true"
        run: npm run sync:shiphero-onhold
